<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCIFY</title>

    <link rel="stylesheet" href="calcu.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <h1>CALCIFY</h1>

    <div class="calculator">

        <input type="text" id="display" readonly>

        <button class="operator">AC</button>
        <button class="operator">⌫</button>
        <button class="operator">%</button>
        <button class="operator" id="divisionBTN">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator" id="multiplyBTN">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator" id="subtractBTN">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator" id="additionBTN">+</button>

        <button class="zero">0</button>
        <button>.</button>
        <button class="equals">=</button>

    </div>

    <script src="calcu.js"></script>

</body>
</html>
