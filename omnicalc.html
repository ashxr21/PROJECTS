<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="omnicalc.css">
    <link rel="icon" type="image/png" href="images/favicon.png"> 
    <title>OMNICALC</title>
</head>
<body>
    <h1>OMNICALC</h1>
    <div class="calculator">
        <input type="text" id="display" readonly>

        <button>⌫</button>
        <button>AC</button>
        <button>%</button>
        <button class="operator" id="divisionBTN">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator" id="multiplyBTN">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator" id="subtractBTN">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator" id="additionBTN">+</button>

        <button class="zero">0</button>
        <button>.</button>
        <button class="equals">=</button>
    </div>

    <script src="calcu2.js"></script>
</body>
</html>
